tools_dir: ~/.dotbins

platforms:
  linux:
    - amd64

tools:
  starship:
    repo: starship/starship
    shell_code:
      bash,zsh: |
        eval "$(starship init __DOTBINS_SHELL__)"
  nvim:
    repo: neovim/neovim
    shell_code:
      bash,zsh: |
        alias vim="nvim"
  lazygit: jesseduffield/lazygit
  bat: sharkdp/bat
  uv: astral-sh/uv
